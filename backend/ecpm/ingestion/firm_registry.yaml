# Curated firm-level dataset for corporate concentration analysis.
#
# Maps each tracked 3-digit NAICS sector to its dominant publicly-traded
# firms with SEC EDGAR CIK numbers.  The EdgarClient pulls annual revenue
# from XBRL CompanyFacts for every CIK listed here, aggregates by parent
# company, and computes real CR4 / CR8 / HHI.
#
# `parent` groups subsidiaries and post-M&A entities under one umbrella.
# When a firm has been acquired (e.g. Pioneer -> ExxonMobil in 2024),
# set its parent to the acquirer so revenues roll up correctly.
#
# Maintenance: update this file when major M&A occurs or a new top-10
# entrant appears.  The weekly EDGAR task will automatically pick up
# changes on the next run.

