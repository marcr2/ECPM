services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecpm}
      POSTGRES_USER: ${POSTGRES_USER:-ecpm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecpm_dev}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./config/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecpm -d ecpm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    command: uvicorn ecpm.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - indicator_cache:/app/cache
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery_worker:
    build:
      context: ./backend
    command: celery -A ecpm.tasks.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    volumes:
      - indicator_cache:/app/cache
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
    command: celery -A ecpm.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - indicator_cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  timescaledb_data:
  indicator_cache:
