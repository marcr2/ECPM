<!DOCTYPE html>
<html>
<head>
    <title>Crisis Date Test</title>
</head>
<body>
    <h1>Crisis Date Format Test</h1>
    <div id="output"></div>

    <script>
        // Simulate the crisis episodes
        const crises = [
            { name: "Great Recession", startDate: "2007-12-01", endDate: "2009-06-01" },
            { name: "COVID", startDate: "2020-02-01", endDate: "2020-04-01" }
        ];

        // Simulate API data with ISO datetime format
        const apiData = [
            { date: "2007-01-01T00:00:00", value: 10 },
            { date: "2007-12-01T00:00:00", value: 9 },
            { date: "2008-06-01T00:00:00", value: 7 },
            { date: "2009-06-01T00:00:00", value: 8 },
            { date: "2020-02-01T00:00:00", value: 12 },
            { date: "2020-04-01T00:00:00", value: 11 }
        ];

        // Test WITHOUT normalization
        let output = "<h2>Without normalization (.slice(0,10)):</h2>";
        output += "<pre>Crisis start: " + crises[0].startDate + "\n";
        output += "API date:     " + apiData[1].date + "\n";
        output += "Match: " + (crises[0].startDate === apiData[1].date) + "</pre>";

        // Test WITH normalization
        const normalizedData = apiData.map(d => ({
            ...d,
            date: d.date.slice(0, 10)
        }));

        output += "<h2>With normalization (.slice(0,10)):</h2>";
        output += "<pre>Crisis start: " + crises[0].startDate + "\n";
        output += "API date:     " + normalizedData[1].date + "\n";
        output += "Match: " + (crises[0].startDate === normalizedData[1].date) + "</pre>";

        output += "<h2>Normalized Chart Data:</h2><pre>";
        normalizedData.forEach(d => {
            output += d.date + " => " + d.value + "\n";
        });
        output += "</pre>";

        document.getElementById('output').innerHTML = output;
    </script>
</body>
</html>
