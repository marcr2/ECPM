# Production stack: no docker-compose.override.yml (omit it: do not merge dev binds/ports).
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Set CADDY_DOMAIN to your public hostname for HTTPS. For local smoke tests use CADDY_DOMAIN=:80
# and open http://127.0.0.1 (plain HTTP on port 80).

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    command: >
      postgres
      -c max_locks_per_transaction=4096
      -c max_pred_locks_per_transaction=4096
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecpm}
      POSTGRES_USER: ${POSTGRES_USER:-ecpm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./config/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecpm -d ecpm"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
          pids: 256
    security_opt:
      - no-new-privileges:true
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
          pids: 64
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - redis_data:/data
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    build:
      context: ./backend
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.cache
    networks:
      - ecpm-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command:
      - uvicorn
      - ecpm.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "${UVICORN_WORKERS:-4}"
    env_file:
      - .env
    volumes:
      - indicator_cache:/app/cache
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
          pids: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.cache
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A ecpm.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - indicator_cache:/app/cache
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
          pids: 128
    security_opt:
      - no-new-privileges:true
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A ecpm.tasks.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file:
      - .env
    volumes:
      - indicator_cache:/app/cache
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
          pids: 64
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
          pids: 256
    security_opt:
      - no-new-privileges:true
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - ecpm-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  timescaledb_data:
  indicator_cache:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  ecpm-net:
    driver: bridge
